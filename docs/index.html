<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jp-regions-i18n — Demo</title>
  <meta name="description" content="日本の都道府県・市区町村を10言語で検索できるインタラクティブデモ" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon" aria-hidden="true">🗾</span>
        <span class="header-name">jp-regions-i18n</span>
        <span class="header-badge">demo</span>
      </div>
      <p class="header-desc">
        日本の都道府県・市区町村データを 10 言語で検索 &mdash;
        <a href="https://github.com/toshtag/jp-regions-i18n" target="_blank" rel="noopener">GitHub</a>
        &nbsp;|&nbsp;
        <a href="https://www.npmjs.com/package/jp-regions-i18n" target="_blank" rel="noopener">npm</a>
      </p>
    </div>
  </header>

  <main class="layout">
    <!-- Left: search + prefecture list -->
    <aside class="sidebar">
      <div class="search-wrap">
        <label for="search" class="visually-hidden">検索</label>
        <input
          id="search"
          type="search"
          class="search-input"
          placeholder="都道府県名・コードで検索 (任意言語可)"
          autocomplete="off"
          spellcheck="false"
        />
        <span class="search-icon" aria-hidden="true">🔍</span>
      </div>
      <div id="pref-count" class="pref-count"></div>
      <ul id="pref-list" class="pref-list" role="listbox" aria-label="都道府県一覧"></ul>
    </aside>

    <!-- Right: detail + cities -->
    <section class="detail-panel" id="detail-panel">
      <div class="detail-placeholder" id="detail-placeholder">
        <p>← 都道府県を選択すると<br>全言語の表記と市区町村が表示されます</p>
      </div>

      <!-- Prefecture detail -->
      <div id="pref-detail" class="pref-detail hidden">
        <div class="detail-header">
          <h2 id="detail-title"></h2>
          <div class="detail-codes" id="detail-codes"></div>
          <button class="btn-copy" id="btn-copy-pref" title="JSON をコピー">
            <span class="copy-icon">📋</span> Copy JSON
          </button>
        </div>
        <div class="lang-grid" id="lang-grid"></div>
      </div>

      <!-- Cities -->
      <div id="cities-section" class="cities-section hidden">
        <div class="cities-header">
          <h3 id="cities-title"></h3>
          <span id="cities-count" class="cities-count"></span>
        </div>
        <div id="cities-container" class="cities-container"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      Powered by
      <a href="https://www.npmjs.com/package/jp-regions-i18n" target="_blank" rel="noopener">jp-regions-i18n</a>
      &nbsp;&mdash;&nbsp; MIT License
    </p>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
